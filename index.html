<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Outreach CRM</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<style>
  :root {
    --font: Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    --bg: #f6f9fd;
    --sidebar: #e5effa;
    --surface: #ffffff;
    --surface2: #eef4fc;
    --text: #111827;
    --text2: rgba(17,24,39,.60);
    --text3: rgba(17,24,39,.38);
    --border: rgba(17,24,39,.10);
    --border2: rgba(17,24,39,.18);
    --radius: 10px; --radius-lg: 12px;
    --primary: #0061c2;
    --primary-dark: #004e9b;
    --primary-bg: rgba(0,97,194,.10);
    --shadow-card: 0 1px 2px rgba(16,24,40,.06);
    --shadow-float: 0 8px 24px rgba(16,24,40,.12);
    /* status colours */
    --green: #2d6a0a; --green-bg: #e8f5e0; --green-text: #1e4a07;
    --amber: #8a4f00; --amber-bg: #fef0d8; --amber-text: #6b3c00;
    --purple: #4a43a8; --purple-bg: #eeedfd; --purple-text: #352f85;
    --gray-bg: #eaecf0; --gray-text: #374151;
    --red-bg: #fdecea; --red-text: #7b1d1d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font: 400 14px/1.5 var(--font); color: var(--text); background: var(--bg); }
  button, input, select, textarea { font: inherit; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Layout shell ─────────────────────────────────────────── */
  .shell { height: 100vh; display: grid; grid-template-columns: 1fr; }

  /* Topbar */
  .main { display: grid; grid-template-rows: 56px 1fr; min-width: 0; }
  .topbar-divider { width: 1px; height: 22px; background: var(--border2); margin: 0 2px; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; gap: 12px; }
  .topbar-left { display: flex; align-items: center; gap: 24px; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
  .logo-icon { font-size: 17px; }
  .nav-menu { display: flex; gap: 2px; }
  .nav-item { height: 36px; padding: 0 14px; border-radius: 10px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-weight: 500; transition: all 0.12s; }
  .nav-item:hover { background: var(--primary-bg); color: var(--primary); }
  .nav-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .topbar-collapse { display: flex; flex: 1; align-items: center; justify-content: space-between; gap: 12px; margin-left: 24px; }
  .burger { display: none; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; align-items: center; justify-content: center; }
  .burger:hover { background: var(--surface2); }
  .view { display: none; }
  .view.active { display: block; }

  /* ── Mobile / narrow: collapse the header into a burger menu ── */
  @media (max-width: 820px) {
    .topbar { position: relative; padding: 0 14px; }
    .topbar-left { flex: 1; justify-content: space-between; gap: 12px; }
    .burger { display: inline-flex; }
    .topbar-collapse {
      display: none; position: absolute; top: 56px; left: 0; right: 0;
      flex-direction: column; align-items: stretch; gap: 8px; margin: 0; padding: 12px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-float); z-index: 60;
    }
    .topbar.open .topbar-collapse { display: flex; }
    .nav-menu { flex-direction: column; gap: 4px; }
    .nav-item { width: 100%; text-align: left; height: 40px; }
    .topbar-actions { flex-direction: column; align-items: stretch; gap: 6px; }
    .topbar-actions .btn { width: 100%; justify-content: flex-start; }
    .topbar-actions .btn.icon-only { width: 100%; justify-content: center; }
    .save-wrap { justify-content: space-between; width: 100%; }
    .topbar-divider { display: none; }
  }

  /* Buttons */
  .btn { height: 36px; padding: 0 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 13px; white-space: nowrap; text-decoration: none; transition: background 0.12s; box-shadow: var(--shadow-card); }
  .btn:hover { background: var(--surface2); }
  .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: none; }
  .btn.primary:hover { background: var(--primary-dark); }
  .btn.green { background: var(--green); border-color: var(--green); color: #fff; box-shadow: none; }
  .btn.green:hover { background: var(--green-text); }
  .btn.sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .btn.icon-only { width: 36px; padding: 0; justify-content: center; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.danger:hover { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
  .btn.message-btn { background: var(--amber-bg); border-color: var(--amber-text); color: var(--amber-text); font-weight: 500; }
  .btn.message-btn:hover { background: var(--amber-text); color: #fff; }
  #env-toggle.test { background: var(--amber-bg); border-color: var(--amber-text); color: var(--amber-text); font-weight: 600; }

  /* Save indicator */
  .save-wrap { display: flex; align-items: center; gap: 8px; }
  .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); display: none; }
  .save-dot.show { display: inline-block; }
  .sync-status { font-size: 11px; color: var(--text3); }

  /* Tooltips */
  [data-tip] { position: relative; }
  [data-tip]:hover::after { content: attr(data-tip); position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; font-size: 11px; line-height: 1.4; padding: 6px 10px; border-radius: 8px; white-space: normal; width: max-content; max-width: 220px; z-index: 3000; pointer-events: none; box-shadow: var(--shadow-float); }
  [data-tip]:hover::before { content: ""; position: absolute; top: calc(100% + 1px); left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-bottom-color: var(--text); z-index: 3000; }

  /* Banner */
  .banner { height: 72px; border-radius: 12px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; overflow: hidden; margin-bottom: 18px; border: 1px solid rgba(255,255,255,.08); }
  .banner::before, .banner::after { content: ""; position: absolute; width: 220px; height: 220px; border-radius: 999px; background: rgba(255,255,255,.18); pointer-events: none; }
  .banner::before { left: -100px; top: -120px; }
  .banner::after { right: -100px; top: -130px; background: rgba(255,255,255,.14); }
  .banner-title { font-size: 20px; font-weight: 700; position: relative; z-index: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
  .banner-actions { display: flex; gap: 8px; position: relative; z-index: 1; }
  .banner-pill { height: 34px; padding: 0 16px; border-radius: 10px; border: 0; background: rgba(255,255,255,.18); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.12s; }
  .banner-pill:hover { background: rgba(255,255,255,.28); }
  .banner-pill.active { background: #fff; color: var(--primary); font-weight: 600; }

  /* Content area */
  .content { padding: 20px; overflow: auto; }

  /* Stat tiles */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; box-shadow: var(--shadow-card); transition: border-color 0.12s, box-shadow 0.12s; }
  .stat:hover { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
  .stat.active { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 0 0 3px var(--primary-bg); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-value.amber { color: var(--amber); } .stat-value.blue { color: var(--primary); }
  .stat-value.green { color: var(--green); } .stat-value.purple { color: var(--purple); }
  .stat-value.red { color: #c0392b; }

  /* Filter rows */
  .filters { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search { flex: 1; min-width: 160px; max-width: 260px; height: 36px; padding: 0 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: 10px; background: var(--surface); color: var(--text); }
  .search:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .type-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .type-pill { height: 30px; padding: 0 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.12s; }
  .type-pill:hover { border-color: var(--primary); color: var(--primary); }
  .type-pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* View toggle (list / board) */
  .view-toggle { display: inline-flex; border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; background: var(--surface); }
  .view-toggle button { height: 36px; padding: 0 12px; border: 0; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
  .view-toggle button.active { background: var(--primary); color: #fff; font-weight: 600; }

  /* Kanban board */
  .board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; align-items: flex-start; }
  .col { flex: 0 0 260px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; max-height: calc(100vh - 320px); }
  .col-head { padding: 10px 12px; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  .col-head .cnt { background: var(--surface); border-radius: 999px; padding: 1px 8px; font-size: 11px; color: var(--text2); font-weight: 600; }
  .col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; min-height: 60px; flex: 1; }
  .col.drag-over .col-body { outline: 2px dashed var(--primary); outline-offset: -6px; border-radius: 10px; }
  .kcard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 11px; box-shadow: var(--shadow-card); cursor: grab; }
  .kcard:active { cursor: grabbing; }
  .kcard.dragging { opacity: 0.5; }
  .kcard .kc-name { font-size: 13px; font-weight: 700; }
  .kcard .kc-title { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .kcard .kc-co { font-size: 11px; color: var(--primary); margin-top: 4px; font-weight: 600; }
  .kcard .kc-foot { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .kcard .kc-pd { font-size: 10px; background: var(--green-bg); color: var(--green-text); border-radius: 999px; padding: 1px 7px; font-weight: 600; }
  .col-head.s-new{background:var(--gray-bg)} .col-head.s-benaderen{background:var(--purple-bg)} .col-head.s-messaged{background:var(--amber-bg)} .col-head.s-lead{background:var(--primary-bg)} .col-head.s-in-pipedrive{background:var(--primary-bg)} .col-head.s-unqualified{background:var(--red-bg)} .col-head.s-not-interested{background:#fce8d8}

  /* Lead cards */
  .leads { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); transition: border-color 0.12s; }
  .card:hover { border-color: rgba(17,24,39,.22); }
  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 600; }
  .card-title { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-move { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .co-tag { font-size: 12px; padding: 2px 9px; border-radius: 6px; font-weight: 500; }
  .co-old { background: var(--gray-bg); color: var(--gray-text); }
  .co-new { background: var(--primary-bg); color: var(--primary-dark); }
  .co-size { font-size: 11px; color: var(--text3); }
  .src-tag { font-size: 10px; padding: 2px 7px; border-radius: 999px; background: var(--surface2); color: var(--text3); font-weight: 500; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .card-note { font-size: 12px; color: var(--text2); margin-top: 8px; padding: 8px 12px; background: var(--surface2); border-radius: var(--radius); line-height: 1.5; }
  .msg-log { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .msg-row { font-size: 12px; background: var(--surface2); border-radius: 8px; padding: 6px 10px; line-height: 1.45; }
  .msg-meta { display: block; color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 2px; }
  .msg-text { color: var(--text2); white-space: pre-wrap; }
  .card-actions { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .card-actions .spacer { flex: 1; }

  /* Status badges */
  .status-select { appearance: none; -webkit-appearance: none; border: none; border-radius: 999px; font-size: 11px; font-weight: 600; padding: 4px 12px; cursor: pointer; outline: none; }
  .status-select:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .s-new { background: var(--gray-bg); color: var(--gray-text); }
  .s-benaderen { background: var(--purple-bg); color: var(--purple-text); }
  .s-messaged { background: var(--amber-bg); color: var(--amber-text); }
  .s-lead { background: var(--primary-bg); color: var(--primary); }
  .s-in-pipedrive { background: var(--primary-bg); color: var(--primary); }
  .s-unqualified { background: var(--red-bg); color: var(--red-text); }
  .s-not-interested { background: #fce8d8; color: #7c3000; }
  .lt-direct { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--green-bg); color: var(--green-text); font-weight: 600; }
  .lt-partner { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--purple-bg); color: var(--purple-text); font-weight: 600; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(17,24,39,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-float); }
  .modal.wide { max-width: 560px; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 600; }
  .field input, .field select, .field textarea { width: 100%; height: 40px; padding: 0 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: 10px; background: var(--bg); color: var(--text); }
  .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .field textarea { height: auto; min-height: 72px; padding: 8px 12px; resize: vertical; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Pipedrive modal */
  .pd-check { font-size: 12px; padding: 9px 12px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; background: var(--surface2); color: var(--text2); }
  .pd-check.checking { background: var(--amber-bg); color: var(--amber-text); }
  .pd-check.ok { background: var(--green-bg); color: var(--green-text); }
  .pd-check.warn { background: var(--red-bg); color: var(--red-text); }
  .pd-rows { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .pd-row { display: flex; gap: 12px; padding: 10px 12px; background: var(--surface); }
  .pd-row:nth-child(even) { background: var(--surface2); }
  .pd-k { flex: 0 0 110px; font-size: 12px; color: var(--text2); font-weight: 600; }
  .pd-v { flex: 1; font-size: 13px; color: var(--text); }

  /* Toast */
  .import-toast { position: fixed; bottom: 80px; right: 22px; background: var(--text); color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 13px; z-index: 4000; animation: slideIn 0.25s ease; max-width: 300px; box-shadow: var(--shadow-float); }
  @keyframes slideIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }

  /* Gate (lock screen) */
  .gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 5000; padding: 1.5rem; }
  .gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-float); }
  .gate-card h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: var(--primary); }
  .gate-card p { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 18px; }
  .gate-err { font-size: 12px; color: var(--red-text); background: var(--red-bg); padding: 8px 12px; border-radius: 8px; margin-top: 10px; display: none; }
  .gate-err.show { display: block; }
  .gate-note { font-size: 11px; color: var(--text3); margin-top: 14px; line-height: 1.5; }
  .lang-switch { display: flex; gap: 4px; margin-bottom: 18px; }
  .lang-switch button { flex: 1; font-size: 12px; padding: 6px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); border-radius: 8px; cursor: pointer; }
  .lang-switch button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .app-shell { display: none; }
  .app-shell.ready { display: block; }

  /* Help tab */
  .help-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-card); }
  .help-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .help-section p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
  .tag-grid { display: flex; flex-direction: column; gap: 8px; }
  .tag-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .tag-row .meaning { color: var(--text2); }
  .flow-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px){ .flow-cards { grid-template-columns: 1fr; } }
  .flow-card { border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; transition: all 0.12s; background: var(--surface); box-shadow: var(--shadow-card); }
  .flow-card:hover { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 0 0 3px var(--primary-bg); }
  .flow-card .fc-icon { font-size: 24px; }
  .flow-card h4 { font-size: 14px; font-weight: 700; margin: 8px 0 4px; }
  .flow-card p { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .wt-num { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 12px; font-weight: 700; align-items: center; justify-content: center; margin-right: 8px; }
  code { background: var(--surface2); padding: 1px 6px; border-radius: 5px; font-size: 12px; }
  .webhook-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .webhook-table th, .webhook-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .webhook-table th { color: var(--text3); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.04em; }
  .future-badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: var(--amber-bg); color: var(--amber-text); font-weight: 600; }

  /* Help button (HoorayHR floating ?) */
  .help-fab { position: fixed; right: 22px; bottom: 22px; width: 52px; height: 52px; border-radius: 999px; border: 0; background: var(--primary); color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-float); z-index: 900; display: flex; align-items: center; justify-content: center; }
  .help-fab:hover { background: var(--primary-dark); }
  .help-fab.pulse { animation: fabPulse 2s ease-in-out infinite; }
  @keyframes fabPulse { 0%,100%{ box-shadow:var(--shadow-float);} 50%{ box-shadow:0 0 0 8px var(--primary-bg), var(--shadow-float);} }

  /* ── Interactive product tour (spotlight + coach marks) ─────────────────────── */
  #tour { position: fixed; inset: 0; z-index: 6000; }
  .tour-mask { position: fixed; background: rgba(17,24,39,.58); pointer-events: auto; }

// ── transport ───────────────────────────────────────────────────────────────
async function n8nCall(action,payload={},keyOverride){
  // While the interactive tour runs, never hit n8n — return canned data so the
  // tour is fully self-contained, can't create real deals, and works offline.
  if(tourActive) return tourFakeResponse(action);
  const key=keyOverride||getKey();
  const resp=await fetch(currentWebhookUrl(),{ method:'POST', headers:{'Content-Type':'application/json','X-API-Key':key}, body:JSON.stringify({action,apiKey:key,...payload}) });
  if(resp.status===401||resp.status===403) throw new Error('401');
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  return resp.json();
}
async function reloadFromN8n(silent=false){
  if(!getKey()) return;
  // Refresh overwrites the in-memory leads with the server copy — warn first if
  // there are unsaved edits (Lock and Env-switch already guard this way).
  if(!silent && dirty && !confirm(t('refreshDirty'))) return;
  setSync(t('loading'));
  try {
    const result=await n8nCall('list');
    leads=normalizeLeads(result.leads||[]);
    if(Array.isArray(result.templates)&&result.templates.length) templates=normTpls(result.templates);
    await loadTemplates();
    dirty=false; updateSaveUI(); saveCache(); render();
    if(activeView==='messages') renderMessagesView();
    setSync(t('loadingDone')); if(!silent) toast(t('loaded'));
  } catch(e){ setSync(t('loadErr')); if(e.message==='401'){ toast(t('badKey'),true); lockAndReload(); } else toast(t('loadFail')+e.message,true); }
}
async function syncToN8n(){
  if(!getKey()) return; const btn=document.getElementById('save-btn'); btn.disabled=true; setSync(t('saving'));
  try { await n8nCall('sync',{leads:leads.filter(l=>!l._demo)}); await persistTemplates(true); dirty=false; updateSaveUI(); saveCache(); setSync(t('savedShort')); toast(t('saved')); }
  catch(e){ setSync(t('saveErrShort')); toast(t('saveFail')+e.message,true); }
  finally { btn.disabled=false; }
}

    notes:l.notes||'', manualType:l.manualType||null, source:l.source||'', pipedrive:l.pipedrive||'',
    sdr:Array.isArray(l.sdr)?l.sdr:(typeof l.sdr==='string'&&l.sdr?safeArr(l.sdr):[]),

    messagesSent:Array.isArray(l.messagesSent)?l.messagesSent:(typeof l.messagesSent==='string'&&l.messagesSent?safeArr(l.messagesSent):[])
  }));
}

// ── Display-time dedupe ───────────────────────────────────────────────────────
// The same person saved from two different Sales Navigator searches arrives with
// two different URLs, so n8n (which matches on URL) can't merge them and we get a
// duplicate row. This collapses leads that share name + company into a single
// card. It is purely a frontend view: both sheet rows stay, but status / owner /
// pipedrive changes are propagated to every underlying row so they never diverge.
function dupKey(l){
  const n=(l.name||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  const c=((l.newCompany||l.oldCompany||'')).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  return (n&&c)?(n+'|'+c):''; // only dedupe when both a name and a company are present
}
function rankStatus(s){ const i=STATUS_ORDER.indexOf(s); return i<0?-1:i; }
function advanceStatus(l,s){ if(rankStatus(l.status)<rankStatus(s)) l.status=s; }
// All raw leads sharing the dedup identity of the lead with this id (incl. itself).
function leadGroupOf(id){
  const l=leads.find(x=>x.id===id); if(!l) return [];
  const k=dupKey(l); if(!k) return [l];
  return leads.filter(x=>dupKey(x)===k);
}
function mergeLeads(members){
  const sorted=members.slice().sort((a,b)=>
    rankStatus(b.status)-rankStatus(a.status)
    || ((b.messagesSent||[]).length)-((a.messagesSent||[]).length)
    || String(a.id).localeCompare(String(b.id)));
  const p=sorted[0];
  const uniq=arr=>Array.from(new Set(arr));
  const sdr=uniq([].concat(...members.map(m=>m.sdr||[])));
  const tags=uniq([].concat(...members.map(m=>m.tags||[])));
  const notes=uniq(members.map(m=>(m.notes||'').trim()).filter(Boolean)).join(' • ');
  const msgs=[].concat(...members.map(m=>Array.isArray(m.messagesSent)?m.messagesSent:[]))
    .slice().sort((a,b)=>String(a.sentAt||'').localeCompare(String(b.sentAt||'')));
  const pd=(members.find(m=>m.pipedrive)||{}).pipedrive||'';
  return Object.assign({},p,{ sdr, tags, notes, messagesSent:msgs, pipedrive:pd,
    _dup:true, _dupCount:members.length, _memberIds:members.map(m=>m.id) });
}
// Raw `leads` collapsed for display. Each entry is either a plain lead or a merged one.
function dedupedLeads(){
  const groups=new Map(), order=[];
  leads.forEach(l=>{
    const k=dupKey(l);
    if(!k){ order.push({single:l}); return; }
    if(!groups.has(k)){ const g={members:[]}; groups.set(k,g); order.push({group:g}); }
    groups.get(k).members.push(l);
  });
  return order.map(o=>o.single?o.single:(o.group.members.length===1?o.group.members[0]:mergeLeads(o.group.members)));
}

function getFilteredLeads(allStatuses){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  return dedupedLeads().filter(l=>{
    const mf=allStatuses||activeFilter==='all'||l.status===activeFilter;
    const mt=activeLeadType==='all'||getLeadType(l)===activeLeadType;
    const ms=sdrMatch(l);
    const mtag=activeTag==='all'||(activeTag==='__none'?(!l.tags||l.tags.length===0):(l.tags||[]).includes(activeTag));
    const mq=!q||l.name.toLowerCase().includes(q)||(l.newCompany||'').toLowerCase().includes(q)||(l.oldCompany||'').toLowerCase().includes(q);
    return mf&&mt&&mq&&ms&&mtag;
  });
}

let dragLeadId=null;
function boardDragStart(e,id){ dragLeadId=id; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',id);}catch(_){} e.target.classList.add('dragging'); }
function boardDragEnd(e){ e.target.classList.remove('dragging'); document.querySelectorAll('.col.drag-over').forEach(c=>c.classList.remove('drag-over')); }
function boardDragOver(e,col){ e.preventDefault(); e.dataTransfer.dropEffect='move'; col.classList.add('drag-over'); }
function boardDrop(e,col){

function renderMsgLog(l){

function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateStatus(id,sel){

// ── Pipedrive: existence check via the n8n pipedrive-check action ──
async function pipedriveCheck(lead){
  return n8nCall('pipedrive-check',{lead:{name:lead.name,newCompany:lead.newCompany||lead.oldCompany||'',url:lead.url||''}});
}
async function checkLeadInPipedrive(id){
  const l=leads.find(x=>x.id===id); if(!l)return;
  setSync(t('pdChecking'));
  try{
    const r=await pipedriveCheck(l);
    const pe=r&&r.personExists, oe=r&&r.orgExists;
    if(pe||oe) toast('⚠️ '+t('pdMaybeDup',{who:[pe?t('pdPerson'):'',oe?t('pdOrg'):''].filter(Boolean).join(' + ')}));
    else toast('✓ '+t('pdNotFound'));
    setSync('');
  }catch(e){ setSync(''); toast(t('pdFail')+(e.message==='401'?t('badKey'):e.message),true); }
}
// ── Pipedrive deal title: "<flag> LinkedIn Outreach CRM · <company> · <person>" ──
// Flag = the owning SDR's country (first owner; falls back to the current user).
function dealFlag(l){
  const owner=(l.sdr||[]).find(id=>userById(id));
  const u=owner?userById(owner):(getCurrentUser()?userById(getCurrentUser()):null);
  return (u&&u.flag)?u.flag:'';
}
function dealTitleFor(l){
  const flag=dealFlag(l), company=l.newCompany||l.oldCompany||'';
  const parts=['LinkedIn Outreach CRM']; if(company) parts.push(company); if(l.name) parts.push(l.name);
  return (flag?flag+' ':'')+parts.join(' · ');
}
// ── Pipedrive: nice confirmation modal that shows exactly what will be created ──
function addToPipedrive(id){ openPipedriveModal(id); }
// `revertTo`: when the modal was opened by a *status change* (dropdown / board drop)
// the lead is already set to in-pipedrive — if the user cancels, roll the status
// back so we never leave "in Pipedrive" without an actual deal.
let pdRevertStatus=null;
function openPipedriveModal(id, revertTo){
  const l=leads.find(x=>x.id===id); if(!l)return;
  if(l.pipedrive){ toast(t('pdAlready')); return; }
  pdRevertStatus = revertTo || null;
  const dealTitle=dealTitleFor(l);
  const notePreview=t('pdNotePreview',{old:l.oldCompany||'?',new:l.newCompany||'?'});
  document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cancelPipedrive('${l.id}')"><div class="modal">
    <h2>📇 ${t('pdModalTitle')}</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">${t('pdModalIntro',{name:esc(l.name)})}</p>
    <div id="pd-check" class="pd-check checking">⏳ ${t('pdChecking')}</div>
    <div class="pd-rows">
      <div class="pd-row"><span class="pd-k">🏢 ${t('pdOrg')}</span><span class="pd-v">${esc(l.newCompany||'—')}</span></div>
      <div class="pd-row"><span class="pd-k">👤 ${t('pdPerson')}</span><span class="pd-v">${esc(l.name)}${l.title?(' · '+esc(l.title)):''}</span></div>
      <div class="pd-row"><span class="pd-k">💼 ${t('pdDeal')}</span><span class="pd-v">${esc(dealTitle)}</span></div>
      <div class="pd-row"><span class="pd-k">📝 ${t('pdNote')}</span><span class="pd-v">${esc(notePreview)}</span></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="cancelPipedrive('${l.id}')">${t('cancel')}</button>
      <button class="btn green" id="pd-go" onclick="doPipedriveAdd('${l.id}')">✓ ${t('pdCreate')}</button>
    </div>
  </div></div>`;
  // run the existence check in the background and reflect it
  pipedriveCheck(l).then(r=>{
    const el=document.getElementById('pd-check'); if(!el) return;
    const pe=r&&r.personExists, oe=r&&r.orgExists;
    if(pe||oe){ el.className='pd-check warn'; el.innerHTML='⚠️ '+t('pdMaybeDup',{who:[pe?t('pdPerson'):'',oe?t('pdOrg'):''].filter(Boolean).join(' + ')}); }
    else { el.className='pd-check ok'; el.textContent='✓ '+t('pdNotFound'); }
  }).catch(()=>{ const el=document.getElementById('pd-check'); if(el){ el.className='pd-check'; el.textContent='– '+t('pdCheckFail'); } });
}
// Cancel the Pipedrive modal — and undo the status change if it only happened to open this modal.
function cancelPipedrive(id){
  if(pdRevertStatus){ const rs=pdRevertStatus; leadGroupOf(id).forEach(x=>x.status=rs); pdRevertStatus=null; markDirty(); render(); }
  closeModal();
}
async function doPipedriveAdd(id){
  const l=leads.find(x=>x.id===id); if(!l)return;
  const btn=document.getElementById('pd-go'); if(btn){ btn.disabled=true; btn.textContent='⏳'; }
  setSync(t('pdAdding'));

    const r=await n8nCall('pipedrive-add',{lead:{name:l.name,title:l.title,oldCompany:l.oldCompany,newCompany:l.newCompany,url:l.url,leadType:getLeadType(l),notes:l.notes,dealTitle:dealTitleFor(l)}});
    const dealId=(r&&r.dealId)?String(r.dealId):'yes';
    pdRevertStatus=null; // the deal exists now — nothing to revert
    leadGroupOf(id).forEach(x=>{ x.pipedrive=dealId; x.status='in-pipedrive'; });
    markDirty(); closeModal(); render(); setSync(t('pdAdded')); toast(t('pdAdded'));
    autoSync(); // the deal is live server-side — persist the flag now so it can't be re-created
  } catch(e){ setSync(''); if(btn){ btn.disabled=false; btn.textContent='✓ '+t('pdCreate'); } toast(t('pdFail')+(e.message==='401'?t('badKey'):e.message),true); }
}

// ── AI assist in the composer — all built on the single `ai-message` action ──
const AI_REFINE = {

  shorter:'Make this message clearly shorter and punchier (2-3 sentences max) while keeping it warm and personal.',
  warmer:'Make this message warmer, friendlier and more human, without becoming salesy.',
  personal:"Make this message more personal and specific: build on this person's recent job change and any notes provided, and remove anything generic or templated.",
  question:'Keep this message but make sure it ends with one genuine, easy-to-answer question that naturally invites a reply.'

function leadCtx(l){ return {name:l.name,title:l.title,oldCompany:l.oldCompany,newCompany:l.newCompany,leadType:getLeadType(l),notes:l.notes}; }
// Guess the prospect's likely language from their location/company text so outreach is written in THEIR language.
function guessLangName(text){
  const s=(' '+(text||'')+' ').toLowerCase();
  if(/germany|deutschland|austria|österreich|osterreich|switzerland|schweiz/.test(s)) return 'German';
  if(/netherlands|nederland|belgium|belgië|belgie|holland/.test(s)) return 'Dutch';
  return '';
}
function guessLeadLang(l){ return guessLangName(((l&&l.notes)||'')+' '+((l&&l.newCompany)||'')+' '+((l&&l.oldCompany)||'')+' '+((l&&l.title)||'')) || I18N[lang]._name; }
function composeLang(){ const sel=document.getElementById('cm-lang'); if(sel && sel.value && sel.value!=='auto') return sel.value; return guessLeadLang(leads.find(x=>x.id===composeLeadId)); }
function composeLangOptions(l){
  const guess=guessLeadLang(l);
  return [['auto',t('langAuto')+' · '+guess],['English','English'],['German','Deutsch'],['Dutch','Nederlands']]
    .map(([v,lab])=>`<option value="${v}">${esc(lab)}</option>`).join('');
}
function composeBusy(on){

async function runComposeAI(prompt){

// ── CSV / Excel import (frontend only — no webhook / Sheet change) ─────────────
// Upload a CSV or .xlsx and create a lead for every row that has BOTH a name and a
// LinkedIn URL. The LinkedIn column may be named anything containing "linkedin".
// Recognised extra columns (job title, company, email/phone/location) are carried
// over; everything else is ignored. A campaign is required (like every lead). A
// preview modal shows exactly what will be created before anything is added; on
// confirm the leads are created locally and auto-saved via the existing `sync`.
let importState=null;
const NORMH=h=>String(h==null?'':h).toLowerCase().replace(/[^a-z0-9]+/g,'');
function impCell(r,i){ return (i>=0 && r[i]!=null) ? String(r[i]) : ''; }
function impFind(headers,test){ for(let i=0;i<headers.length;i++){ if(test(NORMH(headers[i]),i)) return i; } return -1; }
function normLi(u){ let s=String(u==null?'':u).trim().toLowerCase(); s=s.replace(/^https?:\/\//,'').replace(/^www\./,'').split(/[?#]/)[0].replace(/\/+$/,''); return s.replace(/^[a-z]{2,3}\.linkedin\.com/,'linkedin.com'); }
function impIsLi(v){ return /linkedin/.test(String(v==null?'':v).toLowerCase()); }
function impTidyLi(v){ let s=String(v==null?'':v).trim(); if(!/^https?:\/\//i.test(s)) s='https://'+s.replace(/^\/+/,''); return s; }

// ---- delimited (CSV / TSV): auto-detects , ; or tab, handles quoted fields ----
function parseDelimited(text){
  text=String(text).replace(/^﻿/,'');
  const head=text.slice(0,(text.indexOf('\n')+1)||text.length);
  const counts={',':0,';':0,'\t':0}; for(const ch of head){ if(ch in counts) counts[ch]++; }
  let delim=',',best=-1; for(const d in counts){ if(counts[d]>best){ best=counts[d]; delim=d; } }
  const rows=[]; let row=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; } else field+=c; continue; }
    if(c==='"') inQ=true;
    else if(c===delim){ row.push(field); field=''; }
    else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
    else if(c!=='\r') field+=c;
  }
  if(field!==''||row.length){ row.push(field); rows.push(row); }
  const data=rows.filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>r.map(c=>String(c).trim()));
  return { headers:data[0]||[], rows:data.slice(1) };
}

// ---- xlsx: unzip (ZIP central directory + DecompressionStream) + DOMParser, no lib ----
async function impInflate(u8){ const ds=new DecompressionStream('deflate-raw'); const s=new Blob([u8]).stream().pipeThrough(ds); return new Uint8Array(await new Response(s).arrayBuffer()); }
async function impUnzip(buf){
  const dv=new DataView(buf), u8=new Uint8Array(buf); let eocd=-1;
  for(let i=u8.length-22;i>=0;i--){ if(dv.getUint32(i,true)===0x06054b50){ eocd=i; break; } }
  if(eocd<0) throw new Error('not a zip');
  let p=dv.getUint32(eocd+16,true); const n=dv.getUint16(eocd+10,true); const out={};
  for(let k=0;k<n;k++){
    const method=dv.getUint16(p+10,true), comp=dv.getUint32(p+20,true), nl=dv.getUint16(p+28,true), el=dv.getUint16(p+30,true), cl=dv.getUint16(p+32,true), lo=dv.getUint32(p+42,true);
    const name=new TextDecoder().decode(u8.subarray(p+46,p+46+nl));
    const lnl=dv.getUint16(lo+26,true), lel=dv.getUint16(lo+28,true), ds=lo+30+lnl+lel;
    out[name]={method,data:u8.subarray(ds,ds+comp)};
    p+=46+nl+el+cl;
  }
  return out;
}
async function impEntryText(zip,name){ const e=zip[name]; if(!e) return null; const bytes=e.method===0?e.data:await impInflate(e.data); return new TextDecoder().decode(bytes); }
function colToIdx(ref){ const m=String(ref).match(/^[A-Z]+/); if(!m) return 0; let n=0; for(const ch of m[0]) n=n*26+(ch.charCodeAt(0)-64); return n-1; }
async function parseXlsx(buf){
  const zip=await impUnzip(buf), dom=new DOMParser();
  const sheet=Object.keys(zip).filter(x=>/^xl\/worksheets\/sheet\d+\.xml$/.test(x)).sort((a,b)=>(+a.match(/\d+/)[0])-(+b.match(/\d+/)[0]))[0];
  if(!sheet) throw new Error('no worksheet');
  let shared=[]; const ssTxt=await impEntryText(zip,'xl/sharedStrings.xml');
  if(ssTxt){ shared=Array.from(dom.parseFromString(ssTxt,'application/xml').getElementsByTagName('si'))
    .map(si=>Array.from(si.getElementsByTagName('t')).map(t=>t.textContent).join('')); }
  const sx=dom.parseFromString(await impEntryText(zip,sheet),'application/xml'), out=[];
  Array.from(sx.getElementsByTagName('row')).forEach(rowEl=>{
    const arr=[];
    Array.from(rowEl.getElementsByTagName('c')).forEach(c=>{
      const ref=c.getAttribute('r'), ci=ref?colToIdx(ref):arr.length, ty=c.getAttribute('t');
      let v='';
      if(ty==='inlineStr') v=Array.from(c.getElementsByTagName('t')).map(t=>t.textContent).join('');
      else { const vn=c.getElementsByTagName('v'), raw=vn.length?vn[0].textContent:''; v=ty==='s'?(shared[+raw]||''):raw; }
      arr[ci]=v;
    });
    for(let i=0;i<arr.length;i++) if(arr[i]==null) arr[i]='';
    out.push(arr);
  });
  const data=out.filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>r.map(c=>String(c).trim()));
  return { headers:data[0]||[], rows:data.slice(1) };
}

// .numbers is NOT a CSV — it's Apple's proprietary Snappy+protobuf package, not parseable
// in vanilla JS without a heavy, brittle reverse-engineered reader. So we show clear export
// guidance (persistent in-modal, not a fleeting toast) instead of attempting a flaky parse.
function impShowNote(msg){ const n=document.getElementById('imp-note'); if(n){ n.textContent=msg; n.style.display='block'; } else toast(msg,true); }
function onImportFile(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const nm=file.name.toLowerCase();
  const done=p=>{ setSync(''); if(!p.headers.length||!p.rows.length){ toast(t('impEmpty'),true); return; } importLoaded(p,file.name); };
  const fail=e=>{ setSync(''); toast(t('impParseFail')+((e&&e.message)||e),true); };
  if(nm.endsWith('.numbers')){ impShowNote(t('impNumbers')); return; }
  if(nm.endsWith('.xls')){ impShowNote(t('impXls')); return; }
  setSync(t('impReading'));
  if(nm.endsWith('.xlsx')){ const fr=new FileReader(); fr.onerror=()=>fail(fr.error); fr.onload=()=>parseXlsx(fr.result).then(done).catch(fail); fr.readAsArrayBuffer(file); }
  else { const fr=new FileReader(); fr.onerror=()=>fail(fr.error); fr.onload=()=>{ try{ done(parseDelimited(fr.result)); }catch(e){ fail(e); } }; fr.readAsText(file); }
}
function importLoaded(parsed,fileName){
  const H=parsed.headers;
  const fi=impFind(H,h=>['firstname','voornaam','vorname','prenom','givenname'].includes(h)||h==='first');
  const la=impFind(H,h=>['lastname','achternaam','nachname','surname','familyname'].includes(h)||h==='last');
  const full=impFind(H,h=>['name','naam','fullname','volledigenaam','contact','contactname','contactpersoon','person','persoon'].includes(h));
  const nameCands=[];
  if(fi>=0&&la>=0) nameCands.push({id:'c:'+fi+','+la,label:H[fi]+' + '+H[la],get:r=>(impCell(r,fi)+' '+impCell(r,la)).trim()});
  H.forEach((h,i)=>nameCands.push({id:'col:'+i,label:h||(t('impColumn')+' '+(i+1)),get:r=>impCell(r,i).trim()}));
  const nameId=(fi>=0&&la>=0)?('c:'+fi+','+la):(full>=0?('col:'+full):(fi>=0?('col:'+fi):(nameCands[0]?nameCands[0].id:'')));
  const urlIdx=impFind(H,h=>h.includes('linkedin'));
  const titleIdx=impFind(H,h=>h.includes('jobtitle')||h.includes('jobtitel')||h.includes('function')||h.includes('funktion')||h.includes('functie')||h==='title'||h==='titel'||h.includes('role')||h.includes('rolle')||h.includes('position'));
  const companyIdx=impFind(H,h=>h.includes('company')||h.includes('bedrijf')||h.includes('organi')||h.includes('employer')||h.includes('firma')||h.includes('werkgever')||h==='account');
  importState={ headers:H, rows:parsed.rows, fileName, nameCands, nameId, urlIdx, titleIdx, companyIdx };
  document.getElementById('modal').innerHTML=importMapHTML();
  renderImportPreview();
}

      <datalist id="imp-camp-list">${allTags().map(tg=>`<option value="${escA(tg)}"></option>`).join('')}</datalist>
      ${allTags().length?`<div class="campaign-suggest">${allTags().map(tg=>{ const safe=String(tg).replace(/["'\\<>]/g,''); return `<span class="tag-chip" onclick="impAddCampaign('${safe}')">${esc(tg)}</span>`; }).join('')}</div>`:''}

function impAddCampaign(name){ const inp=document.getElementById('imp-campaign'); if(!inp) return; const cur=inp.value.split(',').map(s=>s.trim()).filter(Boolean); if(!cur.some(c=>c.toLowerCase()===name.toLowerCase())) cur.push(name); inp.value=cur.join(', '); renderImportPreview(); }
function importNameGet(){ const c=(importState.nameCands||[]).find(x=>x.id===importState.nameId); return c?c.get:(()=>''); }
// Columns folded into `notes`: every column except the name column(s), the LinkedIn
// column and the columns already mapped to title/company — with email column(s) FIRST,
// then the remaining columns in their original order. Recomputed from the live mapping
// so it stays correct when the SDR overrides the Name / LinkedIn selects.
function importNotesCols(){
  const S=importState, used=new Set([S.urlIdx,S.titleIdx,S.companyIdx]);
  const nid=S.nameId||'';
  if(nid.slice(0,2)==='c:') nid.slice(2).split(',').forEach(x=>used.add(+x));
  else if(nid.slice(0,4)==='col:') used.add(+nid.slice(4));
  const cols=[]; S.headers.forEach((h,i)=>{ if(!used.has(i)) cols.push(i); });
  const isMail=i=>{ const n=NORMH(S.headers[i]); return n.includes('email')||n.includes('mail'); };
  return cols.filter(isMail).concat(cols.filter(i=>!isMail(i)));
}
function importBuild(){
  const S=importState, getName=importNameGet(), noteCols=importNotesCols();
  const inp=document.getElementById('imp-campaign');
  const campaign=((inp&&inp.value)||'').split(',').map(s=>s.trim()).filter(Boolean);
  const existing=new Set(leads.map(l=>normLi(l.url)).filter(Boolean));
  const seen=new Set(), valid=[]; let skipped=0,dup=0;
  S.rows.forEach(r=>{
    const name=(getName(r)||'').trim(), rawUrl=impCell(r,S.urlIdx).trim();
    if(!name||!impIsLi(rawUrl)){ skipped++; return; }
    const url=impTidyLi(rawUrl), key=normLi(url);
    if(!key){ skipped++; return; }
    if(existing.has(key)||seen.has(key)){ dup++; return; }
    seen.add(key);
    const notes=noteCols.map(i=>{ const v=impCell(r,i).trim(); return v?(S.headers[i]+': '+v):''; }).filter(Boolean).join('\n');
    valid.push({ name, url, title:impCell(r,S.titleIdx).trim(), newCompany:impCell(r,S.companyIdx).trim(), notes });
  });
  return { campaign, valid, skipped, dup };
}
function renderImportPreview(){
  if(!importState) return; const S=importState, box=document.getElementById('imp-preview'); if(!box) return;
  const b=importBuild(), go=document.getElementById('imp-go');
  if(go) go.disabled=!(b.campaign.length && b.valid.length);
  const auto=[];
  if(S.titleIdx>=0) auto.push(t('fTitle')+' ← '+esc(S.headers[S.titleIdx]));

  auto.push(t('fSdr')+' ← '+(getCurrentUser()?esc(userLabel(getCurrentUser())):t('unassignedSdr')));
  const rowsH=b.valid.slice(0,8).map(l=>`<tr><td>${esc(l.name)}</td><td class="imp-url">${esc(l.url.replace(/^https?:\/\//,''))}</td><td>${esc(l.title||'—')}</td><td>${esc(l.newCompany||'—')}</td><td class="imp-url">${esc(l.notes?l.notes.replace(/\n/g,' · '):'—')}</td></tr>`).join('');
  box.innerHTML=`<div class="hint" style="margin:0 0 10px">${t('impAuto')}: ${auto.join(' · ')}</div>
    <div class="imp-stats">
      <span class="imp-pill ok">${t('impWillAdd',{n:b.valid.length})}</span>
      ${b.dup?`<span class="imp-pill warn">${t('impDup',{n:b.dup})}</span>`:''}
      ${b.skipped?`<span class="imp-pill muted">${t('impSkipped',{n:b.skipped})}</span>`:''}
    </div>
    ${b.valid.length
      ?`<div class="imp-table-wrap"><table class="imp-table"><thead><tr><th>${t('fName')}</th><th>LinkedIn</th><th>${t('fTitle')}</th><th>${t('fNew')}</th><th>${t('fNotes')}</th></tr></thead><tbody>${rowsH}</tbody></table></div>${b.valid.length>8?`<div class="hint">${t('impMore',{n:b.valid.length-8})}</div>`:''}`
      :`<div class="hint">${t('impNoneValid')}</div>`}`;
}
async function importConfirm(){

function startTour(){
  if(!document.getElementById('app-shell').classList.contains('ready')) return;
  if(tourActive) return;
  tourActive=true; tourStep=0;
  // reset filters so the demo contact is always visible
  activeFilter='all'; activeLeadType='all'; activeTag='all'; activeSdrs=['all'];
  const s=document.getElementById('search'); if(s) s.value='';
  tourInjectDemo();
  closeMenu();
  if(!document.getElementById('tour')){
    document.body.insertAdjacentHTML('beforeend',
      `<div id="tour"><div class="tour-masks"></div><div class="tour-ring" style="display:none"></div>`
      +`<div class="tour-pop"><div class="tour-pop-head"><span class="tour-pop-step"></span>`
      +`<button class="tour-x" onclick="endTour()" aria-label="Close">✕</button></div>`
      +`<div class="tour-pop-title"></div><div class="tour-pop-body"></div>`
      +`<div class="tour-pop-actions"><button class="btn sm tour-back" onclick="tourBack()"></button>`
      +`<button class="btn sm primary tour-next" onclick="tourNext()"></button></div></div></div>`);
  }
  window.addEventListener('scroll', tourReposition, true);
  window.addEventListener('resize', tourReposition);
  window.addEventListener('keydown', tourKey);
  tourGoto(0);
}
function endTour(){
  if(!tourActive) return;
  tourActive=false;
  window.removeEventListener('scroll', tourReposition, true);
  window.removeEventListener('resize', tourReposition);
  window.removeEventListener('keydown', tourKey);
  const el=document.getElementById('tour'); if(el) el.remove();
  closeModal(); tourRemoveDemo();
  switchView('leads'); render();
}
function tourKey(e){ if(e.key==='Escape') endTour(); else if(e.key==='ArrowRight') tourNext(); else if(e.key==='ArrowLeft') tourBack(); }
function tourNext(){ if(tourStep>=TOUR.length-1) endTour(); else tourGoto(tourStep+1); }
function tourBack(){ if(tourStep>0) tourGoto(tourStep-1); }
function tourGoto(i){
  if(!tourActive) return;
  tourStep=Math.max(0,Math.min(i,TOUR.length-1));
  const step=TOUR[tourStep];
  try{ if(step.setup) step.setup(); }catch(e){}
  // let the DOM settle (modal open / view switch) before measuring
  requestAnimationFrame(()=>requestAnimationFrame(tourRender));
}
function tourTargetEl(){ const s=TOUR[tourStep]; if(!s||!s.target) return null; try{ const el=s.target(); return (el&&el.getBoundingClientRect)?el:null; }catch(e){ return null; } }
function tourRender(){
  if(!tourActive) return;
  const el=tourTargetEl();
  if(el){ const r=el.getBoundingClientRect(); if(r.top<70||r.bottom>innerHeight-90){ try{ el.scrollIntoView({block:'center'}); }catch(e){} } }
  tourPaint(el?el.getBoundingClientRect():null);
}
function tourReposition(){ if(!tourActive) return; if(tourRAF) cancelAnimationFrame(tourRAF); tourRAF=requestAnimationFrame(()=>{ const el=tourTargetEl(); tourPaint(el?el.getBoundingClientRect():null); }); }
function tourPaint(rect){
  const root=document.getElementById('tour'); if(!root) return;
  const step=TOUR[tourStep];
  const masks=root.querySelector('.tour-masks'), ring=root.querySelector('.tour-ring'), pop=root.querySelector('.tour-pop');
  const vw=innerWidth, vh=innerHeight, pad=6;
  const m=(l,tp,w,h)=>`<div class="tour-mask" style="left:${l}px;top:${tp}px;width:${Math.max(0,w)}px;height:${Math.max(0,h)}px"></div>`;
  if(rect && rect.width && rect.height){
    const x=Math.max(0,rect.left-pad), y=Math.max(0,rect.top-pad), w=rect.width+pad*2, h=rect.height+pad*2;
    masks.innerHTML = m(0,0,vw,y)+m(0,y+h,vw,vh-(y+h))+m(0,y,x,h)+m(x+w,y,vw-(x+w),h);
    ring.style.cssText=`display:block;left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
  } else {
    masks.innerHTML = m(0,0,vw,vh); ring.style.display='none';
  }
  root.querySelector('.tour-pop-step').textContent=(tourStep+1)+' / '+TOUR.length;
  root.querySelector('.tour-pop-title').textContent=t(step.title);
  root.querySelector('.tour-pop-body').textContent=t(step.body);
  const back=root.querySelector('.tour-back'); back.textContent=t('back'); back.style.visibility=tourStep===0?'hidden':'visible';
  root.querySelector('.tour-next').textContent=tourStep===TOUR.length-1?t('tourDoneBtn'):t('tourNext');
  tourPositionPop(pop, rect, vw, vh);
}
function tourPositionPop(pop, rect, vw, vh){
  const pw=Math.min(340, vw-24); pop.style.width=pw+'px';
  pop.style.visibility='hidden'; pop.style.left='0px'; pop.style.top='0px';
  const ph=pop.offsetHeight||170; let left, top;
  if(!rect || !rect.width){ left=(vw-pw)/2; top=(vh-ph)/2; }
  else {
    left=Math.min(Math.max(12, rect.left), vw-pw-12);
    if(rect.bottom+12+ph <= vh-8) top=rect.bottom+12;
    else if(rect.top-12-ph >= 8) top=rect.top-12-ph;
    else top=Math.max(12,(vh-ph)/2);
  }
  pop.style.left=left+'px'; pop.style.top=top+'px'; pop.style.visibility='visible';
}

// ── Manager dashboard (Lucas): contacts added + messages sent, per day per SDR ──
// No new n8n action: derived purely from data already in the leads. "Added" date
// comes from the lead id (both the app and the n8n import prefix the id with a
// creation timestamp in ms); rows without such an id are skipped. Each message is
// attributed to the lead's owner(s); a shared contact counts for every owner.
function leadCreatedMs(l){
  const m=String(l.id||'').match(/^(\d{13})/); if(!m) return null;
  const ms=parseInt(m[1],10);
  return (ms>1420070400000 && ms<Date.now()+86400000)?ms:null; // sane range: 2015 .. now
}
function dashDayKey(d){ const z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function dashOwners(l){ const s=(l.sdr||[]).filter(Boolean); return s.length?s:['__none']; }
function dashLabel(id){ return id==='__none'?t('dashUnassigned'):userLabel(id); }
function setDashDays(d){ dashDays=d; renderDashView(); }
function dashData(){
  const now=Date.now(), cutoff=dashDays?now-dashDays*86400000:0;
  const totals={}, daily={};
  const bump=(map,k,f)=>{ if(!map[k]) map[k]={added:0,msgs:0}; map[k][f]++; };
  leads.forEach(l=>{
    const cms=leadCreatedMs(l);
    if(cms!=null && cms>=cutoff){ const dk=dashDayKey(new Date(cms)); daily[dk]=daily[dk]||{}; dashOwners(l).forEach(o=>{ bump(totals,o,'added'); bump(daily[dk],o,'added'); }); }
    (Array.isArray(l.messagesSent)?l.messagesSent:[]).forEach(m=>{
      if(!m||!m.sentAt) return; const ts=Date.parse(m.sentAt); if(isNaN(ts)||ts<cutoff) return;
      const dk=dashDayKey(new Date(ts)); daily[dk]=daily[dk]||{}; dashOwners(l).forEach(o=>{ bump(totals,o,'msgs'); bump(daily[dk],o,'msgs'); });
    });
  });
  return {totals,daily};
}
function renderDashView(){
  const host=document.getElementById('dash-content'); if(!host) return;
  if(!isManager()){ host.innerHTML=`<div class="empty">🔒 ${t('dashLocked')}</div>`; return; }
  const {totals,daily}=dashData();
  const ids=Object.keys(totals).filter(k=>totals[k].added||totals[k].msgs)
    .sort((a,b)=>(totals[b].added+totals[b].msgs)-(totals[a].added+totals[a].msgs));
  const periods=[[7,t('dashLast',{n:7})],[14,t('dashLast',{n:14})],[30,t('dashLast',{n:30})],[0,t('dashAll')]];
  const bar=`<div class="dash-bar">${periods.map(([d,lab])=>`<button class="type-pill${dashDays===d?' active':''}" onclick="setDashDays(${d})">${lab}</button>`).join('')}</div>`;
  const head=`<h2 style="font-size:16px;font-weight:700;margin-bottom:4px">📊 ${t('dashTitle')}</h2>`;
  if(!ids.length){ host.innerHTML=head+bar+`<div class="empty">📭 ${t('dashNoData')}</div>`; return; }
  const numCell=(n,cls)=> n?`<td class="num ${cls}">${n}</td>`:`<td class="num dash-zero">0</td>`;
  let tA=0,tM=0;
  const totalRows=ids.map(id=>{ const v=totals[id]; tA+=v.added; tM+=v.msgs; return `<tr><td>${esc(dashLabel(id))}</td>${numCell(v.added,'dash-add')}${numCell(v.msgs,'dash-msg')}</tr>`; }).join('');
  const totalsTable=`<table class="dash-table">
    <thead><tr><th>${t('dashSdr')}</th><th class="num">${t('dashAdded')}</th><th class="num">${t('dashMessages')}</th></tr></thead>
    <tbody>${totalRows}</tbody>
    <tfoot><tr><td>${t('dashTotal')}</td><td class="num dash-add">${tA}</td><td class="num dash-msg">${tM}</td></tr></tfoot></table>`;
  const dayKeys=Object.keys(daily).sort().reverse();
  const matHead=`<tr><th>${t('dashDay')}</th>${ids.map(id=>`<th class="num">${esc(dashLabel(id))}</th>`).join('')}</tr>`;
  const matRows=dayKeys.map(dk=>{
    const cells=ids.map(id=>{ const v=daily[dk][id]; if(!v||(!v.added&&!v.msgs)) return `<td class="num dash-zero">–</td>`;
      return `<td class="num"><span class="dash-add">+${v.added}</span> <span class="dash-msg">✉${v.msgs}</span></td>`; }).join('');
    const d=new Date(dk+'T00:00:00');
    return `<tr><td>${d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})}</td>${cells}</tr>`;
  }).join('');
  const dailyTable=`<table class="dash-table"><thead>${matHead}</thead><tbody>${matRows}</tbody></table>`;
  host.innerHTML=head+bar
    +`<div class="dash-note">${t('dashNote')}</div>`
    +`<div class="dash-h">${t('dashTotals')}</div>`+totalsTable
    +`<div class="dash-h">${t('dashDaily')} <span style="font-weight:400;color:var(--text3)">(<span class="dash-add">+</span> ${t('dashAdded')} · <span class="dash-msg">✉</span> ${t('dashMessages')})</span></div>`+dailyTable;
}

// Built on the same `ai-message` action (no n8n change). Auto-nudges every 10 sent.
let coachResult='';
function sentCount(){ return parseInt(localStorage.getItem(SENT_LS)||'0',10)||0; }
function bumpSent(){ const n=sentCount()+1; localStorage.setItem(SENT_LS,String(n)); updateCoachNudge(); return n; }
function coachDue(){ const seen=parseInt(localStorage.getItem(COACH_SEEN_LS)||'0',10)||0; return sentCount()-seen>=10; }
function updateCoachNudge(){ const it=document.querySelector('.nav-item[data-view="messages"]'); if(it){ const base=t('navMessages'); it.textContent = coachDue()?(base+' 🔴'):base; } }
function outcomeLabel(st){ return (st==='lead'||st==='in-pipedrive')?'positive — replied / progressed':((st==='unqualified'||st==='not-interested')?'no / not interested':'awaiting reply'); }
function coachDataset(){
  const me=getCurrentUser();
  const mine = me ? leads.filter(l=>(l.sdr||[]).includes(me)) : [];
  const src = mine.length ? mine : leads;
  const rows=[];
  src.forEach(l=>(Array.isArray(l.messagesSent)?l.messagesSent:[]).forEach(m=>{ if(m&&m.text) rows.push({when:m.sentAt||'', text:m.text, status:l.status}); }));
  rows.sort((a,b)=> new Date(b.when||0)-new Date(a.when||0));
  return rows.slice(0,12);
}
async function runCoach(){
  const body=document.getElementById('coach-body'); if(!body)return;
  const rows=coachDataset();
  if(rows.length<2){ body.innerHTML=`<div class="coach-empty">${t('coachNone')}</div>`; return; }
  const data=rows.map((r,i)=>`#${i+1} [outcome: ${outcomeLabel(r.status)}]\n${r.text}`).join('\n\n');
  const system='You are a friendly, practical sales coach for an SDR at HoorayHR who does LinkedIn outreach to people who recently changed jobs. Give concrete, kind, specific and actionable feedback. Never invent facts about the prospects.';
  const prompt=`Here are my recent LinkedIn outreach messages and their outcomes:\n\n${data}\n\nCoach me:\n1. What is working well (be specific and reference my own wording).\n2. Three concrete improvements — for each, rewrite a short improved example based on one of my own messages.\n3. One short encouraging sentence.\nUse short clear headings, keep it practical and not too long. Reply in this language: ${I18N[lang]._name}.`;
  body.innerHTML=`<div class="coach-loading">⏳ ${t('coachAnalyzing')}</div>`;
  try {
    const r=await n8nCall('ai-message',{system,prompt,lead:{messages:rows.length}});
    coachResult=(r&&r.text)?String(r.text).trim():'';
    body.innerHTML = coachResult ? `<div class="coach-text">${esc(coachResult).replace(/\n/g,'<br>')}</div>` : `<div class="coach-empty">${t('aiFail')}</div>`;
    localStorage.setItem(COACH_SEEN_LS,String(sentCount())); updateCoachNudge();
  } catch(e){ body.innerHTML=`<div class="coach-empty">${t('aiFail')}${(e.message==='401'?t('badKey'):e.message)}</div>`; }
}
</script>
</body>
</html>
