<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Outreach CRM</title>
<style>
  :root {
    --font: Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    --bg: #f6f9fd;
    --sidebar: #e5effa;
    --surface: #ffffff;
    --surface2: #eef4fc;
    --text: #111827;
    --text2: rgba(17,24,39,.60);
    --text3: rgba(17,24,39,.38);
    --border: rgba(17,24,39,.10);
    --border2: rgba(17,24,39,.18);
    --radius: 10px; --radius-lg: 12px;
    --primary: #0061c2;
    --primary-dark: #004e9b;
    --primary-bg: rgba(0,97,194,.10);
    --shadow-card: 0 1px 2px rgba(16,24,40,.06);
    --shadow-float: 0 8px 24px rgba(16,24,40,.12);
    /* status colours */
    --green: #2d6a0a; --green-bg: #e8f5e0; --green-text: #1e4a07;
    --amber: #8a4f00; --amber-bg: #fef0d8; --amber-text: #6b3c00;
    --purple: #4a43a8; --purple-bg: #eeedfd; --purple-text: #352f85;
    --gray-bg: #eaecf0; --gray-text: #374151;
    --red-bg: #fdecea; --red-text: #7b1d1d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font: 400 14px/1.5 var(--font); color: var(--text); background: var(--bg); }
  button, input, select, textarea { font: inherit; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Layout shell ─────────────────────────────────────────── */
  .shell { height: 100vh; display: grid; grid-template-columns: 1fr; }

  /* Topbar */
  .main { display: grid; grid-template-rows: 56px 1fr; min-width: 0; }
  .topbar-divider { width: 1px; height: 22px; background: var(--border2); margin: 0 2px; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; gap: 12px; }
  .topbar-left { display: flex; align-items: center; gap: 24px; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
  .logo-icon { font-size: 17px; }
  .nav-menu { display: flex; gap: 2px; }
  .nav-item { height: 36px; padding: 0 14px; border-radius: 10px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-weight: 500; transition: all 0.12s; }
  .nav-item:hover { background: var(--primary-bg); color: var(--primary); }
  .nav-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .topbar-collapse { display: flex; flex: 1; align-items: center; justify-content: space-between; gap: 12px; margin-left: 24px; }
  .burger { display: none; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; align-items: center; justify-content: center; }
  .burger:hover { background: var(--surface2); }
  .view { display: none; }
  .view.active { display: block; }

  /* ── Mobile / narrow: collapse the header into a burger menu ── */
  @media (max-width: 820px) {
    .topbar { position: relative; padding: 0 14px; }
    .topbar-left { flex: 1; justify-content: space-between; gap: 12px; }
    .burger { display: inline-flex; }
    .topbar-collapse {
      display: none; position: absolute; top: 56px; left: 0; right: 0;
      flex-direction: column; align-items: stretch; gap: 8px; margin: 0; padding: 12px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-float); z-index: 60;
    }
    .topbar.open .topbar-collapse { display: flex; }
    .nav-menu { flex-direction: column; gap: 4px; }
    .nav-item { width: 100%; text-align: left; height: 40px; }
    .topbar-actions { flex-direction: column; align-items: stretch; gap: 6px; }
    .topbar-actions .btn { width: 100%; justify-content: flex-start; }
    .topbar-actions .btn.icon-only { width: 100%; justify-content: center; }
    .save-wrap { justify-content: space-between; width: 100%; }
    .topbar-divider { display: none; }
  }

  /* Buttons */
  .btn { height: 36px; padding: 0 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 13px; white-space: nowrap; text-decoration: none; transition: background 0.12s; box-shadow: var(--shadow-card); }
  .btn:hover { background: var(--surface2); }
  .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: none; }
  .btn.primary:hover { background: var(--primary-dark); }
  .btn.green { background: var(--green); border-color: var(--green); color: #fff; box-shadow: none; }
  .btn.green:hover { background: var(--green-text); }
  .btn.sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .btn.icon-only { width: 36px; padding: 0; justify-content: center; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.danger:hover { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
  .btn.message-btn { background: var(--amber-bg); border-color: var(--amber-text); color: var(--amber-text); font-weight: 500; }
  .btn.message-btn:hover { background: var(--amber-text); color: #fff; }
  #env-toggle.test { background: var(--amber-bg); border-color: var(--amber-text); color: var(--amber-text); font-weight: 600; }

  /* Save indicator */
  .save-wrap { display: flex; align-items: center; gap: 8px; }
  .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); display: none; }
  .save-dot.show { display: inline-block; }
  .sync-status { font-size: 11px; color: var(--text3); }

  /* Tooltips */
  [data-tip] { position: relative; }
  [data-tip]:hover::after { content: attr(data-tip); position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; font-size: 11px; line-height: 1.4; padding: 6px 10px; border-radius: 8px; white-space: normal; width: max-content; max-width: 220px; z-index: 3000; pointer-events: none; box-shadow: var(--shadow-float); }
  [data-tip]:hover::before { content: ""; position: absolute; top: calc(100% + 1px); left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-bottom-color: var(--text); z-index: 3000; }

  /* Banner */
  .banner { height: 72px; border-radius: 12px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; overflow: hidden; margin-bottom: 18px; border: 1px solid rgba(255,255,255,.08); }
  .banner::before, .banner::after { content: ""; position: absolute; width: 220px; height: 220px; border-radius: 999px; background: rgba(255,255,255,.18); pointer-events: none; }
  .banner::before { left: -100px; top: -120px; }
  .banner::after { right: -100px; top: -130px; background: rgba(255,255,255,.14); }
  .banner-title { font-size: 20px; font-weight: 700; position: relative; z-index: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
  .banner-actions { display: flex; gap: 8px; position: relative; z-index: 1; }
  .banner-pill { height: 34px; padding: 0 16px; border-radius: 10px; border: 0; background: rgba(255,255,255,.18); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.12s; }
  .banner-pill:hover { background: rgba(255,255,255,.28); }
  .banner-pill.active { background: #fff; color: var(--primary); font-weight: 600; }

  /* Content area */
  .content { padding: 20px; overflow: auto; }

  /* Stat tiles */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; box-shadow: var(--shadow-card); transition: border-color 0.12s, box-shadow 0.12s; }
  .stat:hover { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
  .stat.active { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 0 0 3px var(--primary-bg); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-value.amber { color: var(--amber); } .stat-value.blue { color: var(--primary); }
  .stat-value.green { color: var(--green); } .stat-value.purple { color: var(--purple); }
  .stat-value.red { color: #c0392b; }

  /* Filter rows */
  .filters { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search { flex: 1; min-width: 160px; max-width: 260px; height: 36px; padding: 0 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: 10px; background: var(--surface); color: var(--text); }
  .search:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .type-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .type-pill { height: 30px; padding: 0 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.12s; }
  .type-pill:hover { border-color: var(--primary); color: var(--primary); }
  .type-pill.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* Lead cards */
  .leads { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); transition: border-color 0.12s; }
  .card:hover { border-color: rgba(17,24,39,.22); }
  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 600; }
  .card-title { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-move { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .co-tag { font-size: 12px; padding: 2px 9px; border-radius: 6px; font-weight: 500; }
  .co-old { background: var(--gray-bg); color: var(--gray-text); }
  .co-new { background: var(--primary-bg); color: var(--primary-dark); }
  .co-size { font-size: 11px; color: var(--text3); }
  .src-tag { font-size: 10px; padding: 2px 7px; border-radius: 999px; background: var(--surface2); color: var(--text3); font-weight: 500; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .card-note { font-size: 12px; color: var(--text2); margin-top: 8px; padding: 8px 12px; background: var(--surface2); border-radius: var(--radius); line-height: 1.5; }
  .msg-log { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .msg-row { font-size: 12px; background: var(--surface2); border-radius: 8px; padding: 6px 10px; line-height: 1.45; }
  .msg-meta { display: block; color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 2px; }
  .msg-text { color: var(--text2); white-space: pre-wrap; }
  .card-actions { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .card-actions .spacer { flex: 1; }

  /* Status badges */
  .status-select { appearance: none; -webkit-appearance: none; border: none; border-radius: 999px; font-size: 11px; font-weight: 600; padding: 4px 12px; cursor: pointer; outline: none; }
  .status-select:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .s-new { background: var(--gray-bg); color: var(--gray-text); }
  .s-benaderen { background: var(--purple-bg); color: var(--purple-text); }
  .s-messaged { background: var(--amber-bg); color: var(--amber-text); }
  .s-lead { background: var(--primary-bg); color: var(--primary); }
  .s-in-pipedrive { background: var(--primary-bg); color: var(--primary); }
  .s-unqualified { background: var(--red-bg); color: var(--red-text); }
  .s-not-interested { background: #fce8d8; color: #7c3000; }
  .lt-direct { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--green-bg); color: var(--green-text); font-weight: 600; }
  .lt-partner { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--purple-bg); color: var(--purple-text); font-weight: 600; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(17,24,39,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-float); }
  .modal.wide { max-width: 560px; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 600; }
  .field input, .field select, .field textarea { width: 100%; height: 40px; padding: 0 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: 10px; background: var(--bg); color: var(--text); }
  .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .field textarea { height: auto; min-height: 72px; padding: 8px 12px; resize: vertical; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Toast */
  .import-toast { position: fixed; bottom: 80px; right: 22px; background: var(--text); color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 13px; z-index: 4000; animation: slideIn 0.25s ease; max-width: 300px; box-shadow: var(--shadow-float); }
  @keyframes slideIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }

  /* Gate (lock screen) */
  .gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 5000; padding: 1.5rem; }
  .gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-float); }
  .gate-card h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: var(--primary); }
  .gate-card p { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 18px; }
  .gate-err { font-size: 12px; color: var(--red-text); background: var(--red-bg); padding: 8px 12px; border-radius: 8px; margin-top: 10px; display: none; }
  .gate-err.show { display: block; }
  .gate-note { font-size: 11px; color: var(--text3); margin-top: 14px; line-height: 1.5; }
  .lang-switch { display: flex; gap: 4px; margin-bottom: 18px; }
  .lang-switch button { flex: 1; font-size: 12px; padding: 6px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); border-radius: 8px; cursor: pointer; }
  .lang-switch button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .app-shell { display: none; }
  .app-shell.ready { display: block; }

  /* Help tab */
  .help-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-card); }
  .help-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .help-section p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
  .tag-grid { display: flex; flex-direction: column; gap: 8px; }
  .tag-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .tag-row .meaning { color: var(--text2); }
  .flow-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px){ .flow-cards { grid-template-columns: 1fr; } }
  .flow-card { border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; transition: all 0.12s; background: var(--surface); box-shadow: var(--shadow-card); }
  .flow-card:hover { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 0 0 3px var(--primary-bg); }
  .flow-card .fc-icon { font-size: 24px; }
  .flow-card h4 { font-size: 14px; font-weight: 700; margin: 8px 0 4px; }
  .flow-card p { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .wt-num { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 12px; font-weight: 700; align-items: center; justify-content: center; margin-right: 8px; }
  code { background: var(--surface2); padding: 1px 6px; border-radius: 5px; font-size: 12px; }
  .webhook-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .webhook-table th, .webhook-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .webhook-table th { color: var(--text3); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.04em; }
  .future-badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: var(--amber-bg); color: var(--amber-text); font-weight: 600; }

  /* Help button (HoorayHR floating ?) */
  .help-fab { position: fixed; right: 22px; bottom: 22px; width: 52px; height: 52px; border-radius: 999px; border: 0; background: var(--primary); color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-float); z-index: 900; display: flex; align-items: center; justify-content: center; }
  .help-fab:hover { background: var(--primary-dark); }

  @media (max-width: 900px) { .banner-title { max-width: 100%; } }
  @media (max-width: 700px) { .shell { grid-template-columns: 1fr; } .sidebar { display: none; } }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <h1>🔐 <span data-i18n="appTitle">LinkedIn Outreach CRM</span></h1>
    <div class="lang-switch" id="gate-lang"></div>
    <p data-i18n="gateIntro"></p>
    <div class="field">
      <label data-i18n="apiKeyLabel"></label>
      <input id="gate-key" type="password" autocomplete="off">
    </div>
    <button class="btn primary" id="gate-btn" style="width:100%;justify-content:center" data-i18n="unlockBtn"></button>
    <div class="gate-err" id="gate-err"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">
      <span class="gate-note" id="gate-env-note" style="margin:0"></span>
      <button class="btn sm" id="gate-env-btn" type="button" data-i18n="switchEnv"></button>
    </div>
    <div class="gate-note" data-i18n="gateNote"></div>
  </div>
</div>

<div class="app-shell" id="app-shell">
<div class="shell">
  <!-- Main column -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo"><span class="logo-icon">🎯</span><span data-i18n="appTitle">LinkedIn Outreach CRM</span></div>
        <button class="burger" onclick="toggleMenu()" aria-label="Menu" title="Menu">☰</button>
      </div>
      <div class="topbar-collapse" id="topbar-collapse">
        <nav class="nav-menu">
          <button class="nav-item active" data-view="leads" onclick="switchView('leads')" data-i18n="navLeads"></button>
          <button class="nav-item" data-view="messages" onclick="switchView('messages')" data-i18n="navMessages"></button>
          <button class="nav-item" data-view="help" onclick="switchView('help')" data-i18n="navHelp"></button>
        </nav>
      <div class="topbar-actions">
        <button class="btn sm" id="walkthrough-btn" onclick="openWalkthrough()" data-tip="" data-i18n="howItWorks"></button>
        <button class="btn sm" id="env-toggle" onclick="toggleEnv()" data-tip=""></button>
        <div class="save-wrap">
          <span class="sync-status" id="sync-status"></span>
          <span class="save-dot" id="save-dot" data-tip=""></span>
          <button class="btn green" id="save-btn" onclick="syncToN8n()" data-tip="" data-i18n="saveBtn"></button>
        </div>
        <button class="btn" onclick="reloadFromN8n()" data-tip="" data-i18n="refreshBtn"></button>
        <button class="btn primary" onclick="openAdd()" data-tip="" data-i18n="addBtn"></button>
        <div class="topbar-divider"></div>

function setEnv(env){ localStorage.setItem(ENV_LS, env==='test'?'test':'prod'); publishBridge(); updateEnvUI(); }
function currentWebhookUrl(){ return N8N_URLS[getEnv()]; }

function clearBridge(){ localStorage.removeItem(KEY_BRIDGE); localStorage.removeItem(ENV_BRIDGE); }
function toggleEnv(){ if(dirty && !confirm(t('switchEnv')+'? '+t('unsavedTip'))) return; setEnv(getEnv()==='prod'?'test':'prod'); if(getKey()) reloadFromN8n(); }

async function unlock(){
  const key=document.getElementById('gate-key').value.trim();
  const errEl=document.getElementById('gate-err'); errEl.classList.remove('show');
  if(!key){ showGateError(t('enterKey')); return; }
  const btn=document.getElementById('gate-btn'); btn.disabled=true; btn.textContent='⏳';
  try {
    const result=await n8nCall('list',{},key);
    sessionStorage.setItem(KEY_SS,key);
    leads=normalizeLeads(result.leads||[]);
    if(Array.isArray(result.templates)&&result.templates.length) templates=result.templates;
    saveCache(); publishBridge(); showApp();
    loadTemplates();
  } catch(e){ showGateError(e.message==='401'?t('badKey'):(t('loadFail')+e.message)); btn.disabled=false; btn.textContent=t('unlockBtn'); }
}
function showGateError(m){ const el=document.getElementById('gate-err'); el.textContent=m; el.classList.add('show'); }
function showApp(){ document.getElementById('gate').style.display='none'; document.getElementById('app-shell').classList.add('ready'); applyI18n(); updateEnvUI(); render(); }
(function boot(){
  const k=getKey(); if(!k) return;
  try {
    const cached=JSON.parse(sessionStorage.getItem(CACHE_SS)||'null');
    const tpl=JSON.parse(sessionStorage.getItem(TPL_SS)||'null');
    if(tpl) templates=tpl;
    if(cached){ leads=cached; showApp(); reloadFromN8n(true); } else { showApp(); reloadFromN8n(); }
  } catch(e){}
})();
function lockAndReload(){ if(dirty && !confirm(t('unsavedTip')+'?')) return; sessionStorage.removeItem(KEY_SS); sessionStorage.removeItem(CACHE_SS); sessionStorage.removeItem(TPL_SS); clearBridge(); location.reload(); }

// ── transport ───────────────────────────────────────────────────────────────
async function n8nCall(action,payload={},keyOverride){
  const key=keyOverride||getKey();
  const resp=await fetch(currentWebhookUrl(),{ method:'POST', headers:{'Content-Type':'application/json','X-API-Key':key}, body:JSON.stringify({action,apiKey:key,...payload}) });
  if(resp.status===401||resp.status===403) throw new Error('401');
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  return resp.json();
}
async function reloadFromN8n(silent=false){
  if(!getKey()) return; setSync(t('loading'));
  try {
    const result=await n8nCall('list');
    leads=normalizeLeads(result.leads||[]);
    if(Array.isArray(result.templates)&&result.templates.length) templates=result.templates;
    dirty=false; updateSaveUI(); saveCache(); render();
    if(activeView==='messages') renderMessagesView();
    setSync(t('loadingDone')); if(!silent) toast(t('loaded'));
    loadTemplates();
  } catch(e){ setSync(t('loadErr')); if(e.message==='401'){ toast(t('badKey'),true); lockAndReload(); } else toast(t('loadFail')+e.message,true); }
}
async function syncToN8n(){
  if(!getKey()) return; const btn=document.getElementById('save-btn'); btn.disabled=true; setSync(t('saving'));
  try { await n8nCall('sync',{leads}); await persistTemplates(true); dirty=false; updateSaveUI(); saveCache(); setSync(t('savedShort')); toast(t('saved')); }
  catch(e){ setSync(t('saveErrShort')); toast(t('saveFail')+e.message,true); }
  finally { btn.disabled=false; }
}

// ── templates: same webhook, dedicated actions, mirrored to a Templates sheet ──
async function loadTemplates(){
  if(!getKey()) return;
  try {
    const r=await n8nCall('list-templates');
    if(Array.isArray(r.templates)){
      templates = r.templates.length ? r.templates.map(tp=>({id:tp.id||('t'+uid()),name:tp.name||'—',body:tp.body||''})) : templates;
      saveCache(); if(activeView==='messages') renderMessagesView();
    }
  } catch(e){ /* templates action not set up yet → keep defaults silently */ }
}
async function persistTemplates(silentOk){
  if(!getKey()) return;
  try { await n8nCall('save-templates',{templates}); if(!silentOk) toast(t('tplSavedDb')); }
  catch(e){ if(!silentOk) toast(t('tplSaveFail')+e.message,true); throw e; }
}
function setSync(x){ document.getElementById('sync-status').textContent=x; }
function saveCache(){ try{ sessionStorage.setItem(CACHE_SS,JSON.stringify(leads)); sessionStorage.setItem(TPL_SS,JSON.stringify(templates)); }catch(e){} }
function markDirty(){ dirty=true; updateSaveUI(); saveCache(); }
function updateSaveUI(){ const d=document.getElementById('save-dot'); if(d){ d.classList.toggle('show',dirty); d.setAttribute('data-tip',t('unsavedTip')); } }
window.addEventListener('beforeunload', e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });

function normalizeLeads(arr){
  return (arr||[]).map(l=>({
    id:l.id||uid(), name:l.name||'?', title:l.title||'', oldCompany:l.oldCompany||'', newCompany:l.newCompany||'',
    size:l.size||'', url:l.url||l.linkedinUrl||'',
    status:['new','benaderen','messaged','lead','in-pipedrive','unqualified','not-interested'].includes(l.status)?l.status:'new',
    notes:l.notes||'', manualType:l.manualType||null, source:l.source||'', pipedrive:l.pipedrive||'',
    messagesSent:Array.isArray(l.messagesSent)?l.messagesSent:(typeof l.messagesSent==='string'&&l.messagesSent?safeArr(l.messagesSent):[])
  }));
}

function switchView(v){
  activeView=v;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.getAttribute('data-view')===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='view-'+v));
  const bt=document.getElementById('banner-title');
  if(bt) bt.textContent = v==='messages'?'✉️ '+t('navMessages') : v==='help'?'❔ '+t('navHelp') : '🎯 LinkedIn Outreach';
  if(v==='messages') renderMessagesView();
  if(v==='help') renderHelpView();
  closeMenu();
}

function closeMenu(){ const tb=document.querySelector('.topbar'); if(tb) tb.classList.remove('open'); }
const AVATAR_COLORS=[['#B5D4F4','#042C53'],['#9FE1CB','#04342C'],['#FAC775','#412402'],['#F4C0D1','#4B1528'],['#C0DD97','#173404'],['#F0997B','#4A1B0C']];
function avatarColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function uid(){return Date.now()+Math.random().toString(36).slice(2,6);}
function safeArr(s){ try{ const v=JSON.parse(s); return Array.isArray(v)?v:[]; }catch(e){ return []; } }
function firstName(n){ return (n||'').trim().split(/\s+/)[0]||''; }
function fillPlaceholders(text,l){ return (text||'').replace(/\{voornaam\}/g,firstName(l.name)).replace(/\{bedrijf\}/g,l.newCompany||l.oldCompany||''); }
function setFilter(f){activeFilter=f;render();}
function setLeadType(x){activeLeadType=x;render();}
function getLeadType(l){ if(l&&typeof l==='object'){ if(l.manualType==='partner'||l.manualType==='direct')return l.manualType; return detectLeadType(l.title);} return detectLeadType(l); }
function detectLeadType(title){ const x=(title||'').toLowerCase(); const kw=['interim','freelance','freelancer','zzp',' ai ',' a.i.','/ai','ai/','(ai)']; if(kw.some(k=>x.includes(k))||x.startsWith('ai ')||x.startsWith('a.i.')||x.endsWith(' ai')||x==='ai') return 'partner'; return 'direct'; }
function toggleLeadType(id){ const l=leads.find(x=>x.id===id); if(!l)return; l.manualType=getLeadType(l)==='partner'?'direct':'partner'; markDirty(); render(); }
function statusClass(s){ return {new:'s-new',benaderen:'s-benaderen',messaged:'s-messaged',lead:'s-lead','in-pipedrive':'s-in-pipedrive',unqualified:'s-unqualified','not-interested':'s-not-interested'}[s]||'s-new'; }
function statusLabel(s){ return {new:t('st_new'),benaderen:t('st_benaderen'),messaged:t('st_messaged'),lead:t('st_lead'),'in-pipedrive':t('st_inpd'),unqualified:t('st_unq'),'not-interested':t('st_noint')}[s]||s; }

function renderTypeRow(){
  const all=leads.length, direct=leads.filter(l=>getLeadType(l)==='direct').length, partner=leads.filter(l=>getLeadType(l)==='partner').length;
  const types=[['all',t('allTypes'),all],['direct',t('directLead'),direct],['partner',t('partnerLead'),partner]];
  document.getElementById('type-row').innerHTML=types.map(([k,label,c])=>`<button class="type-pill${activeLeadType===k?' active':''}" onclick="setLeadType('${k}')">${label} <span style="opacity:0.6">${c}</span></button>`).join('');
}
function renderStats(){
  const tf=activeLeadType==='all'?leads:leads.filter(l=>getLeadType(l)===activeLeadType);
  const c=k=>tf.filter(l=>l.status===k).length;
  const cards=[['all',t('allLeads'),'',tf.length],['new',t('st_new'),'',c('new')],['benaderen',t('st_benaderen'),'purple',c('benaderen')],['messaged',t('st_messaged'),'amber',c('messaged')],['lead',t('st_lead'),'green',c('lead')],['in-pipedrive',t('st_inpd'),'blue',c('in-pipedrive')],['unqualified',t('st_unq'),'red',c('unqualified')],['not-interested',t('st_noint'),'',c('not-interested')]];
  renderTypeRow();
  document.getElementById('stats').innerHTML=cards.map(([k,label,col,v])=>`<div class="stat${activeFilter===k?' active':''}" onclick="setFilter('${k}')"><div class="stat-label">${label}</div><div class="stat-value${col?' '+col:''}">${v}</div></div>`).join('');
}
function render(){
  if(!document.getElementById('app-shell').classList.contains('ready')) return;
  renderStats();
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const filtered=leads.filter(l=>{
    const mf=activeFilter==='all'||l.status===activeFilter;
    const mt=activeLeadType==='all'||getLeadType(l)===activeLeadType;
    const mq=!q||l.name.toLowerCase().includes(q)||(l.newCompany||'').toLowerCase().includes(q)||(l.oldCompany||'').toLowerCase().includes(q);
    return mf&&mt&&mq;
  });
  const el=document.getElementById('leads');
  if(!filtered.length){ el.innerHTML=`<div class="empty"><p>👥 ${t('noLeads')}</p></div>`; return; }
  el.innerHTML=filtered.map(l=>{
    const opts=['new','benaderen','messaged','lead','in-pipedrive','unqualified','not-interested'].map(s=>`<option value="${s}" ${l.status===s?'selected':''}>${statusLabel(s)}</option>`).join('');
    const srcLabel = l.source==='salesnav'?'Sales Nav':l.source==='profile'?'LinkedIn':l.source==='manual'?'Manual':'';
    return `<div class="card">
      <div class="card-top">
        <div class="card-info">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <div class="card-name">${esc(l.name)}</div>
            <span class="${getLeadType(l)==='partner'?'lt-partner':'lt-direct'}" onclick="toggleLeadType('${l.id}')" style="cursor:pointer">${getLeadType(l)==='partner'?t('partnerLead'):t('directLead')}${l.manualType?' ✓':''}</span>
            ${srcLabel?`<span class="src-tag">${srcLabel}</span>`:''}
          </div>
          <div class="card-title">${esc(l.title)}</div>
          <div class="card-move">
            ${l.oldCompany?`<span class="co-tag co-old">${esc(l.oldCompany)}</span>→`:''}
            <span class="co-tag co-new">${esc(l.newCompany||'?')}</span>
            ${l.size?`<span class="co-size">${esc(l.size)}</span>`:''}
          </div>
        </div>
        <div class="card-right">
          <select class="status-select ${statusClass(l.status)}" onchange="updateStatus('${l.id}',this)">${opts}</select>
        </div>
      </div>
      ${l.notes?`<div class="card-note">📝 ${esc(l.notes)}</div>`:''}
      ${renderMsgLog(l)}
      <div class="card-actions">
        ${['new','benaderen','messaged'].includes(l.status)?`<button class="btn sm message-btn" onclick="openCompose('${l.id}')">${t('msgSent')}</button>`:''}
        <a href="${esc(l.url||'#')}" target="_blank" class="btn sm">${t('linkedinBtn')}</a>
        ${l.pipedrive?`<span class="btn sm" style="background:var(--green-bg);border-color:var(--green);color:var(--green-text);cursor:default">${t('pdAlready')}</span>`:`<button class="btn sm" onclick="addToPipedrive('${l.id}')">${t('pdAdd')}</button>`}
        <div class="spacer"></div>
        <button class="btn sm icon-only" onclick="editLead('${l.id}')">✏️</button>
        <button class="btn sm icon-only danger" onclick="deleteLead('${l.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function renderMsgLog(l){
  const msgs=Array.isArray(l.messagesSent)?l.messagesSent:[];
  if(!msgs.length) return '';
  const rows=msgs.slice(-4).map(m=>{
    const tp=templates.find(x=>x.id===m.templateId);
    const when=m.sentAt?new Date(m.sentAt).toLocaleDateString(undefined,{day:'numeric',month:'short'}):'';
    const label=tp?esc(tp.name):t('composeFree');
    return `<div class="msg-row"><span class="msg-meta">📤 ${when}${when?' · ':''}${label}</span><span class="msg-text">${esc(m.text||'')}</span></div>`;
  }).join('');
  return `<div class="msg-log">${rows}</div>`;
}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateStatus(id,sel){
  const l=leads.find(x=>x.id===id); if(!l)return;
  const v=sel.value;
  l.status=v; sel.className=`status-select ${statusClass(v)}`; markDirty(); render();
  // Moving to "In Pipedrive" but no deal yet → offer to create it
  if(v==='in-pipedrive' && !l.pipedrive){
    if(confirm(t('pdSyncAsk',{name:l.name}))) addToPipedrive(id,true);
  }
}

// ── Pipedrive: create org+person+deal+note via the n8n pipedrive-add action ──
async function addToPipedrive(id,skipConfirm){
  const l=leads.find(x=>x.id===id); if(!l)return;
  if(l.pipedrive){ toast(t('pdAlready')); return; }
  if(!skipConfirm && !confirm(t('pdConfirm',{name:l.name}))) return;
  setSync(t('pdAdding'));
  try {
    const r=await n8nCall('pipedrive-add',{lead:{name:l.name,title:l.title,oldCompany:l.oldCompany,newCompany:l.newCompany,url:l.url,leadType:getLeadType(l),notes:l.notes}});
    l.pipedrive=(r&&r.dealId)?String(r.dealId):'yes';
    if(l.status!=='in-pipedrive'){ l.status='in-pipedrive'; }
    markDirty(); render(); setSync(t('pdAdded')); toast(t('pdAdded'));
  } catch(e){ setSync(''); toast(t('pdFail')+(e.message==='401'?t('badKey'):e.message),true); }
}

// ── Compose / log a sent message (manual text + optional AI draft) ──
let composeLeadId=null;
function openCompose(id){
  composeLeadId=id;
  const l=leads.find(x=>x.id===id); if(!l)return;
  const tplOpts=`<option value="">${t('composeFree')}</option>`+templates.filter(tp=>!tp.deleted).map(tp=>`<option value="${tp.id}">${escA(tp.name)}</option>`).join('');
  document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal wide">
    <h2>${t('composeTitle')} — ${esc(l.name)}</h2>
    <div class="field"><label>${t('composePick')}</label><select id="cm-tpl" onchange="composePickTemplate()">${tplOpts}</select></div>
    <div class="field"><label>${t('composeMsg')}</label><textarea id="cm-text" style="min-height:120px"></textarea></div>
    <div class="field" style="background:var(--surface2);border-radius:10px;padding:10px">
      <label>✨ ${t('composeAiPrompt')}</label>
      <input id="cm-ai" placeholder="${escA(t('composeAiPh'))}">
      <button class="btn sm" style="margin-top:8px" id="cm-gen" onclick="composeGenerate()">${t('composeGen')}</button>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="composeCopy()">${t('composeCopy')}</button>
      <button class="btn" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn green" onclick="composeMarkSent()">${t('composeMark')}</button>
    </div>
  </div></div>`;
  // preselect first template if any
  const firstTpl=templates.filter(tp=>!tp.deleted)[0];
  if(firstTpl){ document.getElementById('cm-tpl').value=firstTpl.id; composePickTemplate(); }
}
function composePickTemplate(){
  const l=leads.find(x=>x.id===composeLeadId); if(!l)return;
  const id=document.getElementById('cm-tpl').value;
  const tp=templates.find(x=>x.id===id);
  if(tp) document.getElementById('cm-text').value=fillPlaceholders(tp.body,l);
}
async function composeGenerate(){
  const l=leads.find(x=>x.id===composeLeadId); if(!l)return;
  const btn=document.getElementById('cm-gen'); const instr=document.getElementById('cm-ai').value.trim();
  const userPrompt=(instr||'Write a short, warm LinkedIn message congratulating this person on their new role and gently opening a conversation about HR software.')+`\n\nReply in this language: ${I18N[lang]._name}.`;
  btn.disabled=true; btn.textContent=t('composeGening');
  try {
    const r=await n8nCall('ai-message',{system:AI_SYSTEM_PROMPT,prompt:userPrompt,lead:{name:l.name,title:l.title,oldCompany:l.oldCompany,newCompany:l.newCompany,leadType:getLeadType(l),notes:l.notes}});
    const text=(r&&r.text)?r.text:'';
    if(text) document.getElementById('cm-text').value=text;
  } catch(e){ toast(t('aiFail')+(e.message==='401'?t('badKey'):e.message),true); }
  finally { btn.disabled=false; btn.textContent=t('composeGen'); }
}
function composeCopy(){ const ta=document.getElementById('cm-text'); ta.select(); try{ document.execCommand('copy'); }catch(e){} toast(t('composeCopied')); }
function composeMarkSent(){
  const l=leads.find(x=>x.id===composeLeadId); if(!l)return;
  const text=document.getElementById('cm-text').value.trim();
  if(!text){ alert(t('composeEmpty')); return; }
  const tplId=document.getElementById('cm-tpl').value;
  if(!Array.isArray(l.messagesSent)) l.messagesSent=[];
  l.messagesSent.push({templateId:tplId||'', text, sentAt:new Date().toISOString()});
  l.status='messaged';
  markDirty(); closeModal(); render();
  toast(t('msgSent'));
}

function openAdd(){ document.getElementById('modal').innerHTML=modalHTML(); }
function editLead(id){ document.getElementById('modal').innerHTML=modalHTML(leads.find(x=>x.id===id)); }
function closeModal(){ document.getElementById('modal').innerHTML=''; }
function modalHTML(l){
  const sizes=['','1–25','25–100','100–250','250–500','500–1000','>1000'];
  return `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h2>${l?t('editTitle'):t('addTitle')}</h2>
    <div class="field"><label>${t('fName')}</label><input id="f-name" value="${esc(l?.name||'')}"></div>
    <div class="field"><label>${t('fTitle')}</label><input id="f-title" value="${esc(l?.title||'')}"></div>
    <div class="field"><label>${t('fOld')}</label><input id="f-old" value="${esc(l?.oldCompany||'')}"></div>
    <div class="field"><label>${t('fNew')}</label><input id="f-new" value="${esc(l?.newCompany||'')}"></div>
    <div class="field"><label>${t('fSize')}</label><select id="f-size">${sizes.map(s=>`<option ${l?.size===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="field"><label>${t('fUrl')}</label><input id="f-url" value="${esc(l?.url||'')}"></div>
    <div class="field"><label>${t('fNotes')}</label><textarea id="f-notes">${esc(l?.notes||'')}</textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn primary" onclick="${l?`saveLead('${l.id}')`:'addLead()'}">✓ ${l?t('save'):t('add')}</button></div>
  </div></div>`;
}
function readForm(){ return { name:val('f-name'), title:val('f-title'), oldCompany:val('f-old'), newCompany:val('f-new'), size:document.getElementById('f-size').value, url:val('f-url'), notes:val('f-notes') }; }
function val(id){ return document.getElementById(id).value.trim(); }
function addLead(){ const f=readForm(); if(!f.name){ alert(t('nameRequired')); return; } leads.unshift({id:uid(),...f,status:'new',manualType:null,source:'manual',messagesSent:[]}); markDirty(); closeModal(); render(); }
function saveLead(id){ const l=leads.find(x=>x.id===id); if(!l)return; Object.assign(l,readForm()); markDirty(); closeModal(); render(); }
function deleteLead(id){ if(!confirm(t('delConfirm')))return; leads=leads.filter(x=>x.id!==id); markDirty(); render(); }
function toast(msg,err){ const el=document.createElement('div'); el.className='import-toast'; el.style.background=err?'#791F1F':'var(--text)'; el.textContent=msg; document.getElementById('toasts').appendChild(el); setTimeout(()=>el.remove(),3500); }

function openSettings(){
  document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h2>${t('settingsTitle')}</h2>
    <div class="field"><label>${t('language')}</label>
      <select onchange="setLang(this.value)">${Object.keys(I18N).map(c=>`<option value="${c}" ${c===lang?'selected':''}>${I18N[c]._name}</option>`).join('')}</select></div>
    <div class="field"><label>${t('environment')}</label>
      <select onchange="onEnvSelect(this.value)"><option value="prod" ${getEnv()==='prod'?'selected':''}>⚙️ Production</option><option value="test" ${getEnv()==='test'?'selected':''}>🧪 Test</option></select>
      <div style="font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5">${t('envExplain')}</div></div>
    <div class="modal-actions"><button class="btn primary" onclick="closeModal()">${t('close')}</button></div>
  </div></div>`;
}
function onEnvSelect(v){ if(dirty && !confirm(t('unsavedTip')+'?')){ openSettings(); return; } setEnv(v); if(getKey()) reloadFromN8n(); }

function openWalkthrough(){ renderWalkthrough('pick'); }
function renderWalkthrough(state){
  let inner='';
  if(state==='pick'){
    inner=`<h2>❔ ${t('wtTitle')}</h2><p style="font-size:13px;color:var(--text2);margin-bottom:14px">${t('wtPick')}</p>
      <div class="flow-cards">
        <div class="flow-card" onclick="renderWalkthrough('grow')"><div class="fc-icon">🌱</div><h4>${t('flowGrowTitle')}</h4><p>${t('flowGrowDesc')}</p></div>
        <div class="flow-card" onclick="renderWalkthrough('msg')"><div class="fc-icon">✉️</div><h4>${t('flowMsgTitle')}</h4><p>${t('flowMsgDesc')}</p></div>
      </div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">${t('close')}</button></div>`;
  } else {
    const steps = state==='grow'
      ? [[t('growS1t'),t('growS1')],[t('growS2t'),t('growS2')],[t('growS3t'),t('growS3')]]
      : [[t('msgS1t'),t('msgS1')],[t('msgS2t'),t('msgS2')],[t('msgS3t'),t('msgS3')]];
    inner=`<h2>${state==='grow'?'🌱 '+t('flowGrowTitle'):'✉️ '+t('flowMsgTitle')}</h2>`;
    inner+=steps.map(([title,body],i)=>`<div style="margin-bottom:14px"><div style="font-weight:600;font-size:13px;margin-bottom:4px"><span class="wt-num">${i+1}</span>${title}</div><div style="font-size:13px;color:var(--text2);line-height:1.6;margin-left:30px">${body}</div></div>`).join('');
    inner+=`<div class="modal-actions"><button class="btn" onclick="renderWalkthrough('pick')">${t('back')}</button><button class="btn primary" onclick="closeModal()">${t('done')}</button></div>`;
  }
  document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal wide">${inner}</div></div>`;
}

function renderHelpView(){
  const statuses=[['new','s-new'],['benaderen','s-benaderen'],['messaged','s-messaged'],['lead','s-lead'],['in-pipedrive','s-in-pipedrive'],['unqualified','s-unqualified'],['not-interested','s-not-interested']];
  const stRows=statuses.map(([s,cls])=>`<div class="tag-row"><span class="status-select ${cls}" style="cursor:default">${statusLabel(s)}</span></div>`).join('');
  const future=[['enrich',t('whEnrichWhen'),t('whEnrichDoes')],['tag',t('whTagWhen'),t('whTagDoes')]];
  const current=[['list',t('whListWhen'),t('whListDoes')],['sync',t('whSyncWhen'),t('whSyncDoes')],['import',t('whImportWhen'),t('whImportDoes')],['pipedrive-add',t('whPdWhen'),t('whPdDoes')],['ai-message',t('whAiWhen'),t('whAiDoes')],['list-templates',t('whTplWhen'),t('whTplDoesL')],['save-templates',t('whTplSaveWhen'),t('whTplDoesS')]];
  document.getElementById('help-content').innerHTML=`
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">${t('helpTitle')}</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:18px">${t('helpIntro')}</p>
    <div class="help-section"><h3>🏷️ ${t('statusMeaning')}</h3><div class="tag-grid">${stRows}</div></div>
    <div class="help-section"><h3>👤 ${t('typeMeaning')}</h3>
      <div class="tag-row"><span class="lt-direct">${t('directLead')}</span><span class="meaning">${t('typeDirectExpl')}</span></div>
      <div class="tag-row" style="margin-top:8px"><span class="lt-partner">${t('partnerLead')}</span><span class="meaning">${t('typePartnerExpl')}</span></div>
    </div>
    <div class="help-section"><h3>📍 ${t('sourceMeaning')}</h3>
      <div class="tag-row"><span class="src-tag">Sales Nav</span><span class="meaning">${t('srcSalesNav')}</span></div>
      <div class="tag-row" style="margin-top:6px"><span class="src-tag">LinkedIn</span><span class="meaning">${t('srcProfile')}</span></div>
      <div class="tag-row" style="margin-top:6px"><span class="src-tag">Manual</span><span class="meaning">${t('srcManual')}</span></div>
    </div>
    <div class="help-section"><h3>🔗 ${t('dataFlow')}</h3><p>${t('dataFlowExpl')}</p></div>
    <div class="help-section"><h3>🧩 ${t('getExtension')}</h3>
      <p>${t('getExtExpl')}</p>
      <ol style="font-size:13px;color:var(--text2);line-height:1.7;padding-left:20px;margin-bottom:12px">
        <li>${t('extStep1')}</li><li>${t('extStep2')}</li><li>${t('extStep3')}</li><li>${t('extStep4')}</li>
      </ol>
      <a class="btn primary" href="${EXTENSION_ZIP_URL}" download>${t('downloadExt')}</a>
    </div>
    <div class="help-section"><h3>⚙️ ${t('webhooksTitle')}</h3><p>${t('webhooksExpl')}</p>
      <table class="webhook-table">
        <thead><tr><th>${t('whAction')}</th><th>${t('whWhen')}</th><th>${t('whDoes')}</th><th>${t('whStatus')}</th></tr></thead>
        <tbody>
        ${current.map(([a,w,d])=>`<tr><td><code>${a}</code></td><td>${w}</td><td>${d}</td><td><span class="src-tag" style="background:var(--green-bg);color:var(--green-text)">${t('whCurrent')}</span></td></tr>`).join('')}
        ${future.map(([a,w,d])=>`<tr><td><code>${a}</code></td><td>${w}</td><td>${d}</td><td><span class="future-badge">${t('whPlanned')}</span></td></tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderMessagesView(){
  const stats=getMessageStats();
  let h=`<div style="font-size:13px;color:var(--text2);margin-bottom:16px">${t('msgIntro')}</div>`;
  h+=`<div style="background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:18px"><div style="font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;margin-bottom:10px">${t('analytics')}</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">`;
  h+=sbox(stats.totalSent,t('sent'),'')+sbox(stats.toLead,t('toLead'),'var(--green)')+sbox(stats.toUnq,t('toUnq'),'#A32D2D')+sbox(stats.conversionPct+'%',t('conversion'),'var(--blue)');
  h+=`</div></div><div style="font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;margin-bottom:10px">${t('templates')}</div>`;
  templates.filter(tp=>!tp.deleted).forEach(tp=>{ const ts=stats.perTemplate[tp.id]||{sent:0,lead:0,unq:0,pct:0};
    h+=`<div style="border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;background:var(--surface)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
      <input id="tn-${tp.id}" value="${escA(tp.name)}" style="flex:1;font-size:14px;font-weight:600;border:none;background:transparent;color:var(--text);font-family:inherit">
      <div style="display:flex;gap:8px;font-size:11px;color:var(--text2)"><span>📤 ${ts.sent}</span><span style="color:var(--green)">✓ ${ts.lead}</span><span style="color:#A32D2D">✗ ${ts.unq}</span><span style="color:var(--blue);font-weight:600">${ts.pct}%</span></div></div>
      <textarea id="tb-${tp.id}" style="width:100%;font-size:12px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text);min-height:90px;font-family:inherit;line-height:1.5">${escH(tp.body)}</textarea>
      <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end"><button class="btn sm" onclick="saveTemplate('${tp.id}')">${t('update')}</button><button class="btn sm danger" onclick="deleteTemplate('${tp.id}')">🗑</button></div></div>`; });
  h+=`<button class="btn primary" onclick="addTemplate()" style="width:100%">${t('newTemplate')}</button>`;
  h+=`<div style="font-size:11px;color:var(--text3);margin-top:12px">💡 ${t('placeholderHint')}</div>`;
  document.getElementById('messages-content').innerHTML=h;
}
function sbox(v,l,c){return `<div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:600;${c?'color:'+c:''}">${v}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">${l}</div></div>`;}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return (s||'').replace(/"/g,'&quot;');}
function saveTemplate(id){ const tp=templates.find(x=>x.id===id); if(!tp)return; tp.name=document.getElementById('tn-'+id).value.trim()||'—'; tp.body=document.getElementById('tb-'+id).value; markDirty(); persistTemplates(); renderMessagesView(); }
function deleteTemplate(id){ if(!confirm(t('delConfirm')))return; const tp=templates.find(x=>x.id===id); if(tp) tp.deleted=true; markDirty(); persistTemplates(); renderMessagesView(); }
function addTemplate(){ templates.push({id:'t'+Date.now()+Math.random().toString(36).slice(2,5),name:t('newTemplate').replace('➕ ',''),body:'Hoi {voornaam}, ...'}); markDirty(); persistTemplates(); renderMessagesView(); }
function getMessageStats(){ const s={totalSent:0,toLead:0,toUnq:0,perTemplate:{}}; templates.filter(tp=>!tp.deleted).forEach(tp=>s.perTemplate[tp.id]={sent:0,lead:0,unq:0,pct:0});
  leads.forEach(l=>(l.messagesSent||[]).forEach(m=>{ s.totalSent++; if(s.perTemplate[m.templateId]){ s.perTemplate[m.templateId].sent++; if(l.status==='lead'){s.toLead++;s.perTemplate[m.templateId].lead++;} if(l.status==='unqualified'){s.toUnq++;s.perTemplate[m.templateId].unq++;} } }));
  s.conversionPct=s.totalSent?Math.round(s.toLead/s.totalSent*100):0;
  Object.keys(s.perTemplate).forEach(id=>{const x=s.perTemplate[id];x.pct=x.sent?Math.round(x.lead/x.sent*100):0;}); return s; }
</script>
